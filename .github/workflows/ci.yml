name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install xcodegen and swiftlint
        run: |
          brew install xcodegen swiftlint

      - name: Run check
        run: just check
