name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install xcodegen and swiftlint
        run: brew install xcodegen swiftlint

      - name: Generate Xcode project
        run: just generate

      - name: Check (test + integration + lint + build)
        run: just check
