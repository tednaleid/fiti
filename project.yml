name: fiti
options:
  bundleIdPrefix: com.fiti
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  PerfectFreehand:
    path: Packages/PerfectFreehand
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.4.0"

targets:
  fiti:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fiti.app
        PRODUCT_NAME: Fiti
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/fiti.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    dependencies:
      - package: PerfectFreehand
      - package: KeyboardShortcuts

  fiti-unit:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        excludes:
          - AppKitTests
      - path: Sources/Core
      - path: Sources/DevHTTP
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fiti.app.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: ""
    dependencies:
      - package: PerfectFreehand

  fiti-integration:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/Core
      - path: Sources/AppKit
      - path: Sources/App
        excludes:
          - main.swift
      - path: Sources/DevHTTP
      - path: Tests/CoreTests
      - path: Tests/DevHTTPTests
      - path: Tests/AppKitTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: ""
    dependencies:
      - package: PerfectFreehand
      - package: KeyboardShortcuts
